components:
  schemas:
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserAuth'
        unread_messages:
          type: integer
          readOnly: true
        unread_messages_ids:
          type: object
          additionalProperties: {}
          readOnly: true
        last_message:
          type: object
          additionalProperties: {}
          readOnly: true
      required:
      - id
      - last_message
      - unread_messages
      - unread_messages_ids
      - users
    ConversationCreate:
      type: object
      properties:
        recipient_id:
          type: string
          format: uuid
          writeOnly: true
      required:
      - recipient_id
    ConversationDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required:
      - id
      - messages
    Course:
      type: object
      description: Serializes course with topics and feedback.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 256
        photo:
          type: string
          format: uri
        teacher:
          allOf:
          - $ref: '#/components/schemas/UserShort'
          readOnly: true
        start_date:
          type: string
          format: date-time
        duration:
          type: string
        average_rating:
          type: number
          format: float
          readOnly: true
        n_students:
          type: integer
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        is_active:
          type: boolean
        description:
          type: string
        topics:
          type: array
          items:
            $ref: '#/components/schemas/TopicWithLessons'
          readOnly: true
        feedback:
          type: object
          additionalProperties: {}
          readOnly: true
        enrolled:
          type: boolean
          readOnly: true
      required:
      - average_rating
      - created
      - description
      - duration
      - enrolled
      - feedback
      - id
      - n_students
      - photo
      - start_date
      - tags
      - teacher
      - title
      - topics
    CourseBasic:
      type: object
      description: 'Serializes only essential info about the course: id, title and
        image'
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 256
        photo:
          type: string
          format: uri
      required:
      - id
      - photo
      - title
    CourseCreate:
      type: object
      description: Creates new course
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          writeOnly: true
        tags:
          type: array
          items:
            type: string
        topics:
          type: array
          items:
            $ref: '#/components/schemas/TopicCreate'
      required:
      - description
      - end_date
      - id
      - start_date
      - tags
      - title
      - topics
    CourseCreateFeedback:
      type: object
      description: Creates new feedback for the course
      properties:
        course_id:
          type: string
          format: uuid
          writeOnly: true
        text:
          type: string
        created:
          type: string
          format: date-time
          readOnly: true
        rating:
          type: integer
      required:
      - course_id
      - created
      - rating
      - text
    CourseFeedback:
      type: object
      description: Serializes feedback and course from CourseEnrollment model
      properties:
        course:
          allOf:
          - $ref: '#/components/schemas/CourseBasic'
          readOnly: true
        feedback:
          type: object
          additionalProperties: {}
          readOnly: true
      required:
      - course
      - feedback
    CoursePhoto:
      type: object
      description: Serializes photo as image from User model. Used for update and
        create methods
      properties:
        photo:
          type: string
          format: uri
      required:
      - photo
    CourseRetireveUpdate:
      type: object
